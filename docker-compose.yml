version: '3.8'

services:
  web:
    build: .
    container_name: dashboard_web
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
    command: gunicorn -w 4 -b 0.0.0.0:5000 run:app

  bot:
    build: .
    container_name: dashboard_bot
    restart: always
    volumes:
      - .:/app
    environment:
      - FLASK_APP=run.py
    command: python bot.py
    depends_on:
      - web
