{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title mb-4">{{ title }}</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" name="title"
                            value="{{ task.title if task else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"
                            required>{{ task.description if task else '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="due_date" class="form-label">Due Date & Time</label>
                        <input type="datetime-local" class="form-control" id="due_date" name="due_date"
                            value="{{ task.due_date.strftime('%Y-%m-%dT%H:%M') if task else '' }}" required>
                    </div>
                    {% if task %}
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="completed" name="completed" {% if
                            task.completed %}checked{% endif %}>
                        <label class="form-check-label" for="completed">Mark as Completed</label>
                    </div>
                    {% endif %}
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('main.home') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">{{ 'Update' if task else 'Add' }} Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
