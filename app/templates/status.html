{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Server Status</h2>

<div class="row">
    <div class="col-md-4 mb-3">
        <div class="card text-center h-100">
            <div class="card-body">
                <h5 class="card-title">CPU Usage</h5>
                <h2 id="cpu-usage" class="display-4">--%</h2>
                <div class="progress">
                    <div id="cpu-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card text-center h-100">
            <div class="card-body">
                <h5 class="card-title">RAM Usage</h5>
                <h2 id="ram-usage" class="display-4">--%</h2>
                <div class="progress">
                    <div id="ram-bar" class="progress-bar bg-info" role="progressbar" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card text-center h-100">
            <div class="card-body">
                <h5 class="card-title">Disk Usage</h5>
                <h2 id="disk-usage" class="display-4">--%</h2>
                <div class="progress">
                    <div id="disk-bar" class="progress-bar bg-warning" role="progressbar" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card mt-4">
    <div class="card-header">Services</div>
    <div class="card-body">
        <ul id="service-list" class="list-group list-group-flush">
            <li class="list-group-item">Loading services...</li>
        </ul>
    </div>
</div>

<p class="text-muted mt-3 text-end">Last Updated: <span id="last-updated">--</span></p>

{% endblock %}

{% block scripts %}
<script>
    function updateStatus() {
        fetch('/api/status')
            .then(response => response.json())
            .then(data => {
                // Update CPU
                document.getElementById('cpu-usage').innerText = data.cpu + '%';
                document.getElementById('cpu-bar').style.width = data.cpu + '%';

                // Update RAM
                document.getElementById('ram-usage').innerText = data.ram + '%';
                document.getElementById('ram-bar').style.width = data.ram + '%';

                // Update Disk
                document.getElementById('disk-usage').innerText = data.disk + '%';
                document.getElementById('disk-bar').style.width = data.disk + '%';

                // Update Services
                const serviceList = document.getElementById('service-list');
                serviceList.innerHTML = '';
                for (const [service, status] of Object.entries(data.services)) {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    const badgeClass = status === 'running' ? 'bg-success' : 'bg-danger';
                    li.innerHTML = `
                        ${service.charAt(0).toUpperCase() + service.slice(1)}
                        <span class="badge ${badgeClass} rounded-pill">${status}</span>
                    `;
                    serviceList.appendChild(li);
                }

                // Update Timestamp
                document.getElementById('last-updated').innerText = data.last_updated;
            })
            .catch(error => console.error('Error fetching status:', error));
    }

    // Update immediately and then every 10 seconds
    updateStatus();
    setInterval(updateStatus, 10000);
</script>
{% endblock %}
